<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!--
      Defesa em profundidade (Content-Security-Policy). O site é estático e
      self-hosted: scripts e estilos só do próprio domínio, sem inline-script.
      Obs.: 'frame-ancestors' e outros cabeçalhos não são suportados via <meta>
      no GitHub Pages (exigiriam um CDN/proxy na frente).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <script src="/theme.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carlos Eduardo — Desenvolvedor Full Stack</title>
    <meta
      name="description"
      content="Portfólio de Carlos Eduardo, Desenvolvedor Full Stack. Projetos, competências e um mini-game 2D."
    />
    <meta
      property="og:title"
      content="Carlos Eduardo — Desenvolvedor Full Stack"
    />
    <meta
      property="og:description"
      content="Portfólio de Carlos Eduardo, Desenvolvedor Full Stack. Projetos, competências e um mini-game 2D."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://streche.github.io/" />
    <meta
      property="og:image"
      content="https://streche.github.io/og-image.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Carlos Eduardo — Desenvolvedor Full Stack"
    />
    <meta
      name="twitter:description"
      content="Portfólio de Carlos Eduardo, Desenvolvedor Full Stack. Projetos, competências e um mini-game 2D."
    />
    <meta
      name="twitter:image"
      content="https://streche.github.io/og-image.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
